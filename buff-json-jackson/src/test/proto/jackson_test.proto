syntax = "proto3";

package io.suboptimal.buffjson.jackson.proto;

import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option java_package = "io.suboptimal.buffjson.jackson.proto";
option java_outer_classname = "JacksonTestProto";
option java_multiple_files = true;

// All scalar types for conformance testing.
message JacksonTestScalars {
    int32 int32_val = 1;
    int64 int64_val = 2;
    uint32 uint32_val = 3;
    uint64 uint64_val = 4;
    sint32 sint32_val = 5;
    sint64 sint64_val = 6;
    fixed32 fixed32_val = 7;
    fixed64 fixed64_val = 8;
    sfixed32 sfixed32_val = 9;
    sfixed64 sfixed64_val = 10;
    float float_val = 11;
    double double_val = 12;
    bool bool_val = 13;
    string string_val = 14;
    bytes bytes_val = 15;
}

// Nested message for composition tests.
message JacksonNestedMessage {
    int32 id = 1;
    string name = 2;
}

enum JacksonTestEnum {
    JACKSON_TEST_ENUM_UNSPECIFIED = 0;
    JACKSON_TEST_ENUM_FOO = 1;
    JACKSON_TEST_ENUM_BAR = 2;
}

// Complex message with nesting, repeated, map, oneof.
message JacksonTestComplex {
    string name = 1;
    JacksonNestedMessage nested = 2;
    repeated JacksonNestedMessage repeated_nested = 3;
    JacksonTestEnum enum_val = 4;
    repeated JacksonTestEnum repeated_enum = 5;
    map<string, string> string_map = 6;
    map<string, JacksonNestedMessage> message_map = 7;
    map<int32, string> int_map = 8;
    map<bool, string> bool_map = 9;

    oneof value {
        int32 int_value = 10;
        string string_value = 11;
        JacksonNestedMessage message_value = 12;
    }
}

// Well-known types.
message JacksonTestWellKnown {
    google.protobuf.Timestamp timestamp = 1;
    google.protobuf.Duration duration = 2;
    google.protobuf.FieldMask field_mask = 3;
    google.protobuf.Struct struct_val = 4;
    google.protobuf.Value value = 5;
    google.protobuf.ListValue list_value = 6;
    google.protobuf.Int32Value int32_wrapper = 7;
    google.protobuf.UInt32Value uint32_wrapper = 8;
    google.protobuf.Int64Value int64_wrapper = 9;
    google.protobuf.UInt64Value uint64_wrapper = 10;
    google.protobuf.FloatValue float_wrapper = 11;
    google.protobuf.DoubleValue double_wrapper = 12;
    google.protobuf.BoolValue bool_wrapper = 13;
    google.protobuf.StringValue string_wrapper = 14;
    google.protobuf.BytesValue bytes_wrapper = 15;
    google.protobuf.Any any_val = 16;
    google.protobuf.Empty empty_val = 17;
}

// Repeated well-known types for array handling.
message JacksonTestRepeatedWkt {
    repeated google.protobuf.Timestamp timestamps = 1;
    repeated google.protobuf.Duration durations = 2;
}

// Explicit presence (optional keyword).
message JacksonTestOptional {
    optional int32 optional_int32 = 1;
    optional string optional_string = 2;
    optional bool optional_bool = 3;
    optional JacksonNestedMessage optional_nested = 4;
}

// Custom json_name.
message JacksonTestCustomJsonName {
    int32 value = 1 [json_name = "@value"];
    string name = 2 [json_name = "Name"];
}

// Recursive message.
message JacksonTestRecursive {
    int32 value = 1;
    JacksonTestRecursive child = 2;
}

syntax = "proto3";

package io.suboptimal.buffjson.proto;

import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option java_package = "io.suboptimal.buffjson.proto";
option java_outer_classname = "BenchmarkWktProto";
option java_multiple_files = true;

// Timestamp with different nanos precision (0, 6-digit, 9-digit formatting branches)
message BenchTimestamps {
    google.protobuf.Timestamp ts_seconds_only = 1;
    google.protobuf.Timestamp ts_millis = 2;
    google.protobuf.Timestamp ts_nanos = 3;
}

message BenchDurations {
    google.protobuf.Duration positive = 1;
    google.protobuf.Duration negative = 2;
    google.protobuf.Duration with_nanos = 3;
}

message BenchWrappers {
    google.protobuf.Int32Value int32_val = 1;
    google.protobuf.Int64Value int64_val = 2;
    google.protobuf.UInt32Value uint32_val = 3;
    google.protobuf.UInt64Value uint64_val = 4;
    google.protobuf.FloatValue float_val = 5;
    google.protobuf.DoubleValue double_val = 6;
    google.protobuf.BoolValue bool_val = 7;
    google.protobuf.StringValue string_val = 8;
    google.protobuf.BytesValue bytes_val = 9;
}

message BenchStruct {
    google.protobuf.Struct data = 1;
}

message BenchAny {
    google.protobuf.Any value = 1;
}

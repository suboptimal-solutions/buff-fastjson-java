syntax = "proto3";

package io.suboptimal.buffjson.proto;

import "buf/validate/validate.proto";

option java_package = "io.suboptimal.buffjson.proto";
option java_outer_classname = "ValidateTestProto";
option java_multiple_files = true;

// String validation constraints
message TestValidateString {
    // Display name of the entity
    string name = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 100];
    // Contact email address
    string email = 2 [(buf.validate.field).string.email = true];
    // Lowercase identifier
    string pattern_field = 3 [(buf.validate.field).string.pattern = "^[a-z]+$"];
    // Unique resource identifier
    string uuid_field = 4 [(buf.validate.field).string.uuid = true];
    // Resource location
    string uri_field = 5 [(buf.validate.field).string.uri = true];
    // Server hostname
    string hostname_field = 6 [(buf.validate.field).string.hostname = true];
    // Fixed marker value
    string const_field = 7 [(buf.validate.field).string.const = "fixed"];
    // Allowed category code
    string in_field = 8 [(buf.validate.field).string = {in: ["a", "b", "c"]}];
    // IPv4 network address
    string ipv4_field = 9 [(buf.validate.field).string.ipv4 = true];
    // IPv6 network address
    string ipv6_field = 10 [(buf.validate.field).string.ipv6 = true];
}

// Numeric validation constraints
message TestValidateNumbers {
    // Person's age in years
    int32 age = 1 [(buf.validate.field).int32 = {gte: 0, lte: 150}];
    // Game score (positive, below 1000)
    int32 score = 2 [(buf.validate.field).int32 = {gt: 0, lt: 1000}];
    // Item count (at least 1)
    uint32 count = 3 [(buf.validate.field).uint32 = {gte: 1}];
    // Large numeric value
    int64 big_value = 4 [(buf.validate.field).int64 = {gte: 0, lte: 1000000}];
    // Ratio between 0.0 and 1.0
    double ratio = 5 [(buf.validate.field).double = {gte: 0.0, lte: 1.0}];
    // Temperature reading, must be finite
    float temperature = 6 [(buf.validate.field).float = {finite: true, gte: -273.15}];
    // Weight factor, no constraints
    double weight = 7;
}

// Required field constraints
message TestValidateRequired {
    // Full name, must be provided
    string required_name = 1 [(buf.validate.field).required = true];
    // Nickname, optional
    string optional_name = 2;
    // Age, must be provided
    int32 required_age = 3 [(buf.validate.field).required = true];
}

// Repeated field constraints
message TestValidateRepeated {
    // Labels attached to the resource
    repeated string tags = 1 [(buf.validate.field).repeated = {min_items: 1, max_items: 10, unique: true}];
}

// Map field constraints
message TestValidateMap {
    // Arbitrary key-value metadata
    map<string, string> metadata = 1 [(buf.validate.field).map = {min_pairs: 1, max_pairs: 50}];
}

// Enum validation constraints
enum Priority {
    PRIORITY_UNSPECIFIED = 0;
    PRIORITY_LOW = 1;
    PRIORITY_MEDIUM = 2;
    PRIORITY_HIGH = 3;
}

message TestValidateEnum {
    // Task priority level
    Priority priority = 1 [(buf.validate.field).enum = {in: [1, 2, 3]}];
}
